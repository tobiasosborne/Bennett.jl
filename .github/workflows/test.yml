# Bennett-uj6g / U49: CI test workflow. Runs the full Pkg.test() suite on
# every push to main and every pull request, on two Julia versions (LTS and
# latest stable). Catches gate-count regressions, Bennett-invariant
# violations (post-Bennett-asw2 verify_reversibility), and ir_extract /
# lower.jl drift.
#
# Refs: reviews/2026-04-21/UNIFIED_CATALOGUE.md U49; reports #05 F2, #13 F13,
# #17 F6, #18 F19.

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Only run one CI job per branch at a time; cancel in-flight runs when
  # new commits land.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version:
          - '1.10'  # current LTS
          - '1'     # latest stable 1.x
        os:
          - ubuntu-latest
        julia-arch:
          - x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
          arch: ${{ matrix.julia-arch }}

      - name: Cache Julia artifacts, packages, registries
        uses: julia-actions/cache@v2

      - name: Build package
        uses: julia-actions/julia-buildpkg@v1

      - name: Run tests
        uses: julia-actions/julia-runtest@v1
        with:
          annotate_errors: true
